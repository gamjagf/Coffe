<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아침의 시작은 한 잔의 커피로</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background:radial-gradient(ellipse at 30% 20%, #2a2018 0%, #1a1208 60%, #0e0a04 100%);
  display:flex; align-items:center; justify-content:center;
  font-family:"Noto Serif KR",serif; padding:24px;
}
.card {
  width:360px; max-width:100%; border-radius:24px; overflow:hidden;
  box-shadow:0 50px 120px rgba(0,0,0,.7),0 20px 50px rgba(0,0,0,.5),
             0 0 0 1px rgba(255,220,140,.15);
  opacity:0; transform:translateY(50px) scale(.96);
  animation:cardIn 1.4s cubic-bezier(.22,1,.36,1) .3s forwards;
}
.header {
  background:linear-gradient(160deg,#1a1008 0%,#2a1c0c 40%,#3a2810 100%);
  padding:36px 28px 28px; text-align:center; position:relative; overflow:hidden;
}
.hglow {
  position:absolute; top:-40px; left:50%; transform:translateX(-50%);
  width:200px; height:200px; border-radius:50%;
  background:radial-gradient(circle,rgba(180,120,40,.18) 0%,transparent 70%);
  pointer-events:none;
}
.sub {
  font-family:"Cormorant Garamond",serif; font-style:italic;
  font-size:12px; letter-spacing:5px; color:rgba(200,160,80,.7);
  margin-bottom:14px; animation:fadeUp 1s ease .8s both;
}
.title {
  font-size:18px; font-weight:300; color:#f0e8d8;
  line-height:1.85; letter-spacing:2px;
  text-shadow:0 2px 18px rgba(0,0,0,.8); animation:fadeUp 1s ease 1s both;
}
.title span {
  display:block; font-size:23px; font-weight:600; letter-spacing:3px;
  background:linear-gradient(90deg,#c8902a,#f5c842,#ffd96a,#f5c842,#c8902a);
  background-size:300% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:shimmer 3.5s linear infinite, fadeUp 1s ease 1.1s both;
}
.divider {
  width:55px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,150,60,.7),transparent);
  margin:18px auto 0; animation:fadeUp 1s ease 1.2s both;
}
.photo-wrap {
  position:relative; width:100%; height:340px;
  overflow:hidden; background:#0e0a04;
}
.photo-wrap img {
  width:100%; height:100%;
  object-fit:cover; object-position:center 30%;
  display:block; animation:zoomIn 8s ease forwards;
}
#sc {
  position:absolute; top:0; left:0;
  width:100%; height:100%; pointer-events:none;
}
.ot {
  position:absolute; top:0; left:0; right:0; height:80px;
  background:linear-gradient(to bottom,rgba(26,16,8,.5),transparent);
  pointer-events:none;
}
.ob {
  position:absolute; bottom:0; left:0; right:0; height:120px;
  background:linear-gradient(to top,rgba(10,8,4,.88),transparent);
  pointer-events:none;
}
.quote {
  position:absolute; bottom:22px; left:0; right:0; text-align:center;
  animation:fadeUp 1.2s ease 1.6s both; opacity:0;
}
.quote p {
  font-family:"Cormorant Garamond",serif; font-style:italic;
  font-size:14px; color:rgba(245,235,210,.88);
  letter-spacing:1.5px; text-shadow:0 2px 10px rgba(0,0,0,.8);
}
.footer {
  background:linear-gradient(160deg,#1a1008,#2a1c0c);
  padding:20px 28px 24px; text-align:center;
  border-top:1px solid rgba(180,130,50,.2);
}
.fr { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:10px; }
.fl { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(180,130,50,.4)); }
.flr { flex:1; height:1px; background:linear-gradient(90deg,rgba(180,130,50,.4),transparent); }
.fi { font-size:18px; opacity:.8; }
.fm { font-size:13px; font-weight:300; color:rgba(220,200,160,.8); letter-spacing:1.5px; line-height:1.8; margin-bottom:10px; }
.fs { font-family:"Cormorant Garamond",serif; font-style:italic; font-size:11px; color:rgba(160,120,60,.55); letter-spacing:3px; }
@keyframes cardIn { to{opacity:1;transform:translateY(0) scale(1);} }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);} }
@keyframes shimmer { from{background-position:0% center;}to{background-position:300% center;} }
@keyframes zoomIn { from{transform:scale(1.08);}to{transform:scale(1);} }
</style>
</head>

    <div class="hglow"></div>
    <p class="sub">Good Morning</p>

    <canvas id="sc"></canvas>
    <div class="ot"></div>
    <div class="ob"></div>
    <div class="quote"><p>" 따뜻한 한 모금이 하루를 깨웁니다 "</p></div>
  </div>
  <div class="footer">
    <div class="fr">
      <div class="fl"></div>
      <span class="fi">☕</span>
      <div class="flr"></div>
    </div>
    <p class="fm">오늘도 향기로운 하루 되세요</p>
    <p class="fs">Morning Coffee Card</p>
  </div>
</div>

<script>
const canvas = document.getElementById("sc");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width  = canvas.parentElement.offsetWidth;
  canvas.height = canvas.parentElement.offsetHeight;
}
resize();
window.addEventListener("resize", resize);

class Strand {
  constructor(cfg) {
    this.ox    = cfg.x;
    this.oy    = cfg.y;
    this.spd   = cfg.spd   || 0.55;
    this.amp   = cfg.amp   || 20;
    this.freq  = cfg.freq  || 0.018;
    this.phase = cfg.phase || 0;
    this.thick = cfg.thick || 2.5;
    this.len   = cfg.len   || 170;
    this.life  = cfg.life  || 210;
    this.delay = cfg.delay || 0;
    this.t     = -this.delay;
  }
  reset() {
    this.t = -(this.delay * (0.4 + Math.random() * 0.6));
  }
  tick() { this.t += this.spd; }
  draw() {
    if (this.t < 0) return;
    const prog = this.t / this.life;
    if (prog >= 1) { this.reset(); return; }
    const visLen = this.len * Math.min(prog / 0.38, 1);
    const N = 44;
    ctx.beginPath();
    for (let i = 0; i <= N; i++) {
      const f = i / N;
      const y = this.oy - f * visLen;
      const wave =
        Math.sin(f * Math.PI * 3.5 + this.phase + this.t * 0.034) * this.amp * f +
        Math.cos(f * Math.PI * 2.0 + this.phase * 0.7 + this.t * 0.021) * this.amp * 0.4 * f;
      const x = this.ox + wave;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    const fi  = Math.min(prog * 5, 1);
    const fo  = prog > 0.65 ? 1 - (prog - 0.65) / 0.35 : 1;
    const alpha = 0.52 * fi * fo;
    const topY = this.oy - visLen;
    const g = ctx.createLinearGradient(0, this.oy, 0, topY);
    g.addColorStop(0,    "rgba(255,255,255," + (alpha * 0.55) + ")");
    g.addColorStop(0.25, "rgba(248,248,252," + alpha + ")");
    g.addColorStop(0.6,  "rgba(230,235,245," + (alpha * 0.6) + ")");
    g.addColorStop(1,    "rgba(210,220,235,0)");
    ctx.strokeStyle = g;
    ctx.lineWidth   = this.thick * (1 - prog * 0.42);
    ctx.lineCap     = "round";
    ctx.lineJoin    = "round";
    ctx.shadowColor = "rgba(255,255,255,0.18)";
    ctx.shadowBlur  = 5;
    ctx.stroke();
    ctx.shadowBlur  = 0;
  }
}

let strands = [];
function build() {
  const W = canvas.width, H = canvas.height;
  const cx = W * 0.50;
  const cy = H * 0.72;
  strands = [
    new Strand({ x:cx,     y:cy,   spd:.55, amp:22, phase:0,   thick:3.2, len:215, life:235, delay:0   }),
    new Strand({ x:cx-2,   y:cy,   spd:.50, amp:18, phase:.9,  thick:2.4, len:195, life:215, delay:35  }),
    new Strand({ x:cx-20,  y:cy+5, spd:.44, amp:14, phase:1.6, thick:1.8, len:148, life:200, delay:18  }),
    new Strand({ x:cx+18,  y:cy+4, spd:.48, amp:13, phase:2.5, thick:1.7, len:138, life:195, delay:55  }),
    new Strand({ x:cx-9,   y:cy+2, spd:.40, amp:10, phase:3.3, thick:1.3, len:118, life:185, delay:88  }),
    new Strand({ x:cx+9,   y:cy+2, spd:.46, amp:9,  phase:4.2, thick:1.2, len:108, life:180, delay:112 }),
    new Strand({ x:cx-28,  y:cy+9, spd:.37, amp:8,  phase:5.1, thick:0.9, len:92,  life:170, delay:68  }),
    new Strand({ x:cx+26,  y:cy+7, spd:.42, amp:7,  phase:5.8, thick:0.8, len:86,  life:165, delay:92  }),
  ];
}
build();
window.addEventListener("resize", build);

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  strands.forEach(s => { s.tick(); s.draw(); });
  requestAnimationFrame(loop);
}
loop();
</script>
